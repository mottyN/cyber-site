<main>

  <section class="hero" style="padding-bottom: 1rem;">
    <div class="container">
      <h1>צור <span class="highlight">קשר</span></h1>
      <p>מלא את הטופס ונחזור אליך בהקדם — בין אם לבדיקת סייבר ובין אם לבניית אתר.</p>
    </div>
  </section>

  <section style="padding-top: 1rem;">
    <div class="container">
      <div class="form-wrap">
        <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">טופס פנייה</h2>

        <form action="https://formsubmit.co/p0533105452@gmail.com" method="POST">
          <!-- הגדרות FormSubmit -->
          <input type="hidden" name="_subject" value="פנייה חדשה מהאתר — מערכות תוכנה!">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_next" value="https://mottyn.github.io/cyber-site/thanks.html">
          <input type="text" name="_honey" style="display:none">

          <div class="form-group">
            <label>שם מלא <span class="req">*</span></label>
            <input type="text" name="שם מלא" required placeholder="ישראל ישראלי">
          </div>

          <div class="form-group">
            <label>טלפון <span class="req">*</span></label>
            <input type="tel" name="טלפון" required placeholder="050-0000000" dir="ltr" style="text-align: right;">
          </div>

          <div class="form-group">
            <label>אימייל <span class="req">*</span></label>
            <input type="email" name="אימייל" required placeholder="you@example.com" dir="ltr" style="text-align: right;">
          </div>

          <div class="form-group">
            <label>שם העסק <span class="req">*</span></label>
            <input type="text" name="שם העסק" required placeholder="שם העסק שלך">
          </div>

          <div class="form-group">
            <label>במה נוכל לעזור? <span class="req">*</span></label>
            <select name="השירות המבוקש" id="service-select" required>
              <option value="" disabled selected>בחר שירות...</option>
              <optgroup label="🛡️ בדיקות סייבר">
                <option value="בדיקת סייבר בסיסית (חינם)">בדיקת סייבר בסיסית — 300 ₪ (חינם!)</option>
                <option value="בדיקת סייבר מעמיקה">בדיקת סייבר מעמיקה — לפי הצעת מחיר</option>
              </optgroup>
              <optgroup label="💻 בניית אתרים">
                <option value="בניית אתר (חינם)">בניית אתר — חינם</option>
                <option value="פריסה / שרתים / תחזוקה">פריסה / שרתים / תחזוקה</option>
              </optgroup>
              <option value="עוד לא יודע">עוד לא יודע — אשמח לייעוץ</option>
            </select>
          </div>

          <div class="form-group">
            <label>כתובת אתר קיים (אם יש)</label>
            <input type="text" name="כתובת אתר" placeholder="www.your-site.co.il" dir="ltr" style="text-align: right;">
          </div>

          <div class="form-group">
            <label>ספר לנו קצת על העסק <span class="req">*</span></label>
            <textarea name="הודעה" required placeholder="במה העסק עוסק? מה אתה צריך? יש משהו ספציפי שחשוב לך?"></textarea>
          </div>

          <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%;">שלח פנייה 🚀</button>

          <p class="form-note">הפנייה נשלחת ישירות אלינו במייל. נחזור אליך בהקדם!</p>
        </form>

        <script>
          // בחירת השירות מראש לפי הדף שממנו הגיע המבקר (?service=cyber / ?service=web)
          (function () {
            var params = new URLSearchParams(window.location.search);
            var service = params.get('service');
            var select = document.getElementById('service-select');
            if (service === 'cyber') select.value = 'בדיקת סייבר בסיסית (חינם)';
            else if (service === 'web') select.value = 'בניית אתר (חינם)';
          })();

          document.querySelector('form').addEventListener('submit', function () {
            var btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = 'שולח...<span class="spinner"></span>';
          });
        </script>
      </div>
    </div>
  </section>
