  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <!-- Google Analytics -->

    gtag('config', 'G-RD54PNBW5M');
  </script>
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="logo">
      <span class="shield">🛡️</span>
      <span>מערכות תוכנה<small>מחלקת סייבר</small></span>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">בית</a></li>
        <li><a href="services.html">שירותים ומחירים</a></li>
        <li><a href="contact.html" class="cta active">לבדיקת סייבר &larr;</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>

  <section class="hero" style="padding-bottom: 1rem;">
    <div class="container">
      <h1>צור <span class="highlight">קשר</span></h1>
      <p>מלא את הטופס ונחזור אליך בהקדם.</p>
    </div>
  </section>

  <section style="padding-top: 1rem;">
    <div class="container">
      <div class="form-wrap">
        <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">טופס פנייה לבדיקת סייבר</h2>

        <form action="https://formsubmit.co/p0533105452@gmail.com" method="POST">
          <!-- הגדרות FormSubmit -->
          <input type="hidden" name="_subject" value="פנייה חדשה מהאתר — בדיקת סייבר!">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_next" value="https://mottyn.github.io/cyber-site/thanks.html">
          <input type="text" name="_honey" style="display:none">

          <div class="form-group">
            <label>שם מלא <span class="req">*</span></label>
            <input type="text" name="שם מלא" required placeholder="ישראל ישראלי">
          </div>

          <div class="form-group">
            <label>טלפון <span class="req">*</span></label>
            <input type="tel" name="טלפון" required placeholder="050-0000000" dir="ltr" style="text-align: right;">
          </div>

          <div class="form-group">
            <label>אימייל <span class="req">*</span></label>
            <input type="email" name="אימייל" required placeholder="you@example.com" dir="ltr" style="text-align: right;">
          </div>

          <div class="form-group">
            <label>שם העסק <span class="req">*</span></label>
            <input type="text" name="שם העסק" required placeholder="שם העסק שלך">
          </div>

          <div class="form-group">
            <label>כתובת האתר לבדיקה <span class="req">*</span></label>
            <input type="text" name="כתובת האתר" required placeholder="www.your-site.co.il" dir="ltr" style="text-align: right;">
          </div>

          <div class="form-group">
            <label>איזו בדיקה מעניינת אותך? <span class="req">*</span></label>
            <select name="סוג בדיקה" required>
              <option value="" disabled selected>בחר מסלול...</option>
              <option value="בדיקה בסיסית (מבצע 15 ראשונים)">בדיקה בסיסית — 300 ₪ (חינם במבצע ההשקה!)</option>
              <option value="בדיקה מעמיקה">בדיקה מעמיקה — לפי הצעת מחיר</option>
              <option value="עוד לא יודע">עוד לא יודע — אשמח לייעוץ</option>
            </select>
          </div>

          <div class="form-group">
            <label>ספר לנו קצת על העסק <span class="req">*</span></label>
            <textarea name="הודעה" required placeholder="על איזו פלטפורמה האתר בנוי? במה העסק עוסק? יש משהו ספציפי שמדאיג אותך?"></textarea>
          </div>

          <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%;">שלח פנייה 🚀</button>

          <p class="form-note">הפנייה נשלחת ישירות אלינו במייל. נחזור אליך בהקדם!</p>
        </form>

        <script>
          document.querySelector('form').addEventListener('submit', function () {
            var btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = 'שולח...<span class="spinner"></span>';
          });
        </script>
      </div>
    </div>
  </section>

</main>

<footer>
  <div class="container">
    <span>© 2026 מערכות תוכנה — מחלקת סייבר</span>
    <span>טלפון: <a href="tel:0533105452" dir="ltr">053-310-5452</a></span>
  </div>
</footer>

</body>
</html>
